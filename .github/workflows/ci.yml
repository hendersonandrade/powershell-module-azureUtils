name: ci

on:
  pull_request:
  push:
    branches: [ develop ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Install-Module -Name Pester           -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force
          # RequiredModules of the manifest must be present so Import-Module / the
          # Pester tests can load AzureUtils.
          Install-Module -Name Az.Accounts, Az.ResourceGraph, ImportExcel -Scope CurrentUser -Force -AllowClobber

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./AzureUtils -Recurse -Severity Error,Warning
          $results | Format-Table -AutoSize
          if ($results | Where-Object Severity -eq 'Error') {
              Write-Error 'PSScriptAnalyzer reported errors.'
              exit 1
          }

      - name: Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './AzureUtils/Tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Throw = $true
          Invoke-Pester -Configuration $config
